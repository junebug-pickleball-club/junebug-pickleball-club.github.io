<header class="site-header">
  <div class="wrapper">
    <a class="site-title" href="/">
      <img
        src="{{ '/assets/images/logos/JuneBug_Logo_main_horizontal.png' | relative_url }}"
        alt="{{ site.title }}"
        class="site-logo"
        onerror="this.style.display='none'; this.parentElement.appendChild(document.createTextNode('{{ site.title }}'))"
      >
    </a>

    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
    </button>

    <nav class="site-nav" id="site-nav">
      <a class="nav-link{% if page.url == '/' %} active{% endif %}" href="/">Home</a>
      <div class="nav-dropdown{% if page.url contains '/seasons' %} active{% endif %}">
        <button class="nav-dropdown-toggle" aria-haspopup="true" aria-expanded="false">
          Seasons
        </button>
        <ul class="nav-dropdown-menu">
          <li>
            <a href="/seasons/{{ site.active_season }}"{% if page.url == '/seasons/' | append: site.active_season | append: '/' %} class="active"{% endif %}>
              Active Season
            </a>
          </li>
          <li>
            <a href="/seasons/spring-2026"{% if page.url == '/seasons/spring-2026/' %} class="active"{% endif %}>
              Spring 2026
            </a>
          </li>
          <li>
            <a href="/seasons"{% if page.url == '/seasons/' %} class="active"{% endif %}>
              Season Archive
            </a>
          </li>
        </ul>
      </div>

      <a class="nav-link{% if page.url contains '/events' %} active{% endif %}" href="/events">Events</a>
      <a class="nav-link{% if page.url contains '/submit-match' %} active{% endif %}" href="/submit-match">Submit Match</a>
    </nav>
  </div>
</header>

<script>
  (function () {
    var toggle = document.querySelector('.nav-toggle');
    var nav = document.getElementById('site-nav');
    if (!toggle || !nav) return;

    toggle.addEventListener('click', function () {
      var isOpen = nav.classList.toggle('nav-open');
      toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });

    // Seasons dropdown toggle
    var dropdownToggle = document.querySelector('.nav-dropdown-toggle');
    var dropdownMenu = document.querySelector('.nav-dropdown-menu');
    if (dropdownToggle && dropdownMenu) {
      dropdownToggle.addEventListener('click', function () {
        var isExpanded = dropdownMenu.classList.toggle('open');
        dropdownToggle.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');
      });

      // Close dropdown when clicking outside
      document.addEventListener('click', function (e) {
        if (!dropdownToggle.contains(e.target) && !dropdownMenu.contains(e.target)) {
          dropdownMenu.classList.remove('open');
          dropdownToggle.setAttribute('aria-expanded', 'false');
        }
      });

      // Close dropdown on Escape key
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          dropdownMenu.classList.remove('open');
          dropdownToggle.setAttribute('aria-expanded', 'false');
        }
      });
    }
  })();
</script>
