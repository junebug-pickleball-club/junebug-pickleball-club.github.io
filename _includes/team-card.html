<div class="team-card">
  <div class="team-card__logo-wrap">
    {% if include.team.logo %}
      <img
        class="team-card__logo"
        src="{{ include.team.logo }}"
        alt="{{ include.team.name }}"
      >
    {% else %}
      <div class="team-card__logo-placeholder" aria-hidden="true"></div>
    {% endif %}
  </div>
  <h3 class="team-card__name">{{ include.team.name }}</h3>
  <div class="team-card__roster">
    {% if include.team.roster and include.team.roster.size > 0 %}
    <ul>
      {% for player in include.team.roster %}
      <li>{{ player.name }}</li>
      {% endfor %}
    </ul>
    {% else %}
    <p class="team-card__roster-pending">Roster pending</p>
    {% endif %}
  </div>
</div>
